<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff" />

  <!-- Robot Body -->
  <ellipse cx="150" cy="150" rx="80" ry="60" fill="#3498db" stroke="#2980b9" stroke-width="4" />

  <!-- Robot Head -->
  <circle cx="150" cy="100" r="40" fill="#3498db" stroke="#2980b9" stroke-width="4" />

  <!-- Robot Eyes -->
  <circle cx="135" cy="85" r="8" fill="#ffffff" />
  <circle cx="165" cy="85" r="8" fill="#ffffff" />
  <circle cx="135" cy="85" r="4" fill="#000000" />
  <circle cx="165" cy="85" r="4" fill="#000000" />

  <!-- Robot Mouth -->
  <path d="M130 110 Q150 120 170 110" fill="none" stroke="#000000" stroke-width="2" />

  <!-- Robot Antennas -->
  <line x1="150" y1="60" x2="150" y2="30" stroke="#2980b9" stroke-width="3" />
  <line x1="150" y1="60" x2="165" y2="30" stroke="#2980b9" stroke-width="3" />
  <line x1="150" y1="60" x2="135" y2="30" stroke="#2980b9" stroke-width="3" />

  <!-- Robot Shoulders -->
  <rect x="100" y="150" width="20" height="30" fill="#2c3e50" stroke="#2980b9" stroke-width="2" />
  <rect x="180" y="150" width="20" height="30" fill="#2c3e50" stroke="#2980b9" stroke-width="2" />

  <!-- Robot Arms -->
  <line x1="120" y1="150" x2="100" y2="120" stroke="#2c3e50" stroke-width="4" />
  <line x1="180" y1="150" x2="200" y2="120" stroke="#2c3e50" stroke-width="4" />

  <!-- Robot Legs -->
  <rect x="120" y="180" width="20" height="40" fill="#2c3e50" stroke="#2980b9" stroke-width="2" />
  <rect x="160" y="180" width="20" height="40" fill="#2c3e50" stroke="#2980b9" stroke-width="2" />

  <!-- Robot Feet -->
  <rect x="110" y="220" width="40" height="10" fill="#2c3e50" stroke="#2980b9" stroke-width="2" />
  <rect x="150" y="220" width="40" height="10" fill="#2c3e50" stroke="#2980b9" stroke-width="2" />

  <!-- Robot Chest Panel -->
  <rect x="120" y="140" width="60" height="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2" />

  <!-- Robot Panel Details -->
  <circle cx="130" cy="145" r="3" fill="#ffffff" />
  <circle cx="140" cy="145" r="3" fill="#ffffff" />
  <circle cx="150" cy="145" r="3" fill="#ffffff" />
  <circle cx="160" cy="145" r="3" fill="#ffffff" />
  <circle cx="170" cy="145" r="3" fill="#ffffff" />

  <!-- Robot Panel Text (Optional - commented out to avoid rendering in some viewers) -->
  <!-- <text x="150" y="150" font-family="Arial" font-size="8" fill="#ffffff" text-anchor="middle" alignment-baseline="middle">R.O.B.</text> -->

</svg>
